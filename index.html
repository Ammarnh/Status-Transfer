<!DOCTYPE html>
<html lang="id" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TransferFlow — Status Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                    },
                },
            },
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hover-lift { transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15); }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 20px; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 min-h-screen text-slate-200 transition-colors duration-500">

    <!-- Root Container -->
    <div id="root" class="max-w-4xl mx-auto p-3 md:p-6 lg:p-8"></div>

    <script>
        // ──────────────────────────────────────
        // DATA UTAMA — STATUS SUDAH DIATUR
        // ──────────────────────────────────────
        const today = new Date().toISOString().split('T')[0];
        let transfers = [
            { id: 1, nama: "Ruly", platform: "Dana", tanggal: today, status: true },
            { id: 2, nama: "Hani", platform: "Gopay", tanggal: today, status: true },
            { id: 3, nama: "Arif", platform: "Dana", tanggal: today, status: true },
            { id: 4, nama: "Raihan", platform: "OVO", tanggal: today, status: true },
            { id: 5, nama: "Akhdaan", platform: "Dana", tanggal: today, status: true },
            { id: 6, nama: "Rendy", platform: "Gopay", tanggal: today, status: true },
            { id: 7, nama: "Regita", platform: "BNI", tanggal: today, status: true },
            { id: 8, nama: "Dinda", platform: "Gopay", tanggal: today, status: true },
            { id: 9, nama: "Risya", platform: "Gopay", tanggal: today, status: true },
            { id: 10, nama: "Rifqi", platform: "Seabank", tanggal: today, status: true },
            { id: 11, nama: "Hilda", platform: "Dana", tanggal: today, status: true },
            { id: 12, nama: "Niswa", platform: "Gopay", tanggal: today, status: true },
            { id: 13, nama: "Alvin", platform: "Dana", tanggal: today, status: true },
            { id: 14, nama: "Diaz", platform: "Dana", tanggal: today, status: true },
            { id: 15, nama: "Arik", platform: "Dana", tanggal: today, status: true },
            { id: 16, nama: "Farras", platform: "Shopeepay", tanggal: today, status: true },
            { id: 17, nama: "Rasya", platform: "BNI", tanggal: today, status: true },
            { id: 18, nama: "Salim", platform: "Dana", tanggal: today, status: true },
            { id: 19, nama: "Muni", platform: "Dana", tanggal: today, status: false },
            { id: 20, nama: "Gusti", platform: "Dana", tanggal: today, status: false },
            { id: 21, nama: "Syaina", platform: "BRI", tanggal: today, status: false },
            { id: 22, nama: "Naufal Robik Akdila", platform: "Dana", tanggal: today, status: false },
            { id: 23, nama: "Fitri Anggraini", platform: "Dana", tanggal: today, status: false },
            { id: 24, nama: "Qeela", platform: "BNI", tanggal: today, status: false },
            { id: 25, nama: "Ismala", platform: "Dana", tanggal: today, status: false },
            { id: 26, nama: "Yosua", platform: "Seabank", tanggal: today, status: false },
            { id: 27, nama: "Vahra", platform: "Dana", tanggal: today, status: false },
            { id: 28, nama: "Agit Apta Meilano", platform: "BCA", tanggal: today, status: false },
            { id: 29, nama: "Femas", platform: "Gopay", tanggal: today, status: false },
            { id: 30, nama: "Hanafi", platform: "Dana", tanggal: today, status: false },
            { id: 31, nama: "Andre", platform: "BNI", tanggal: today, status: false },
            { id: 32, nama: "Sabrina", platform: "Dana", tanggal: today, status: false },
            { id: 33, nama: "Panji", platform: "Dana", tanggal: today, status: false },
            { id: 34, nama: "Celsi", platform: "Shopeepay", tanggal: today, status: false },
        ];

        // Link Google Drive (satu tombol global)
        const DRIVE_LINK = "https://drive.google.com/drive/folders/1ZCvjnfsZuD9wsMDD58beKaIt-gZf3Ra0?usp=sharing";

        let searchQuery = '';
        let pendingFocus = null;

        document.documentElement.classList.add('dark');

        // ──────────────────────────────────────
        // RENDER
        // ──────────────────────────────────────
        function render() {
            const root = document.getElementById('root');
            const filtered = getFilteredTransfers();
            const stats = getStats();

            root.innerHTML = renderPublicView(filtered, stats);
            lucide.createIcons();

            if (pendingFocus) {
                const el = document.getElementById(pendingFocus);
                if (el) {
                    el.focus();
                    const len = el.value.length;
                    el.setSelectionRange(len, len);
                }
                pendingFocus = null;
            }
        }

        function renderPublicView(filtered, stats) {
            if (transfers.length === 0) {
                return `<div class="text-center py-16"><div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-5"><i data-lucide="inbox" class="w-8 h-8 text-slate-600"></i></div><h3 class="text-lg font-bold text-slate-500 mb-2">Belum Ada Data</h3><p class="text-slate-500 text-sm">Data belum tersedia.</p></div>`;
            }
            return `
            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 md:mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 md:w-12 md:h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/25">
                        <i data-lucide="arrow-left-right" class="w-5 h-5 md:w-6 md:h-6 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-xl md:text-3xl font-black text-white tracking-tight leading-none">TransferFlow</h1>
                        <p class="text-slate-400 text-[9px] md:text-[10px] font-semibold uppercase tracking-[0.2em]">Status Transfer</p>
                    </div>
                </div>
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <div class="relative flex-1 sm:w-48">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input id="publicSearch" type="text" placeholder="Cari nama..." value="${escapeHtml(searchQuery)}"
                            oninput="handleSearchDebounced(this)" class="w-full pl-9 pr-4 py-2.5 bg-slate-800 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-400 text-white placeholder:text-slate-500 border border-slate-700">
                    </div>
                    <a href="${DRIVE_LINK}" target="_blank" rel="noopener noreferrer"
                       class="px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-xl flex items-center gap-2 transition-colors whitespace-nowrap shadow-lg shadow-indigo-500/25">
                        <i data-lucide="folder-open" class="w-4 h-4"></i> Bukti Transfer
                    </a>
                </div>
            </header>
            <div class="grid grid-cols-3 gap-3 md:gap-4 mb-5">
                <div class="bg-slate-800 rounded-2xl p-3 md:p-5 shadow-sm border border-slate-700 text-center"><p class="text-slate-400 text-[10px] uppercase mb-0.5">Total</p><p class="text-xl md:text-3xl font-black text-white">${stats.total}</p></div>
                <div class="bg-slate-800 rounded-2xl p-3 md:p-5 shadow-sm border border-slate-700 text-center"><p class="text-slate-400 text-[10px] uppercase mb-0.5">Selesai</p><p class="text-xl md:text-3xl font-black text-emerald-400">${stats.selesai}</p></div>
                <div class="bg-slate-800 rounded-2xl p-3 md:p-5 shadow-sm border border-slate-700 text-center"><p class="text-slate-400 text-[10px] uppercase mb-0.5">Pending</p><p class="text-xl md:text-3xl font-black text-amber-400">${stats.pending}</p></div>
            </div>
            <div class="space-y-2 md:space-y-3">
                ${filtered.map((t, i) => `
                <div class="bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-700 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 hover-lift animate-fade-in" style="animation-delay: ${i*50}ms">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 md:w-10 md:h-10 rounded-xl flex items-center justify-center font-black text-xs md:text-sm ${t.status ? 'bg-emerald-900/40 text-emerald-400' : 'bg-amber-900/40 text-amber-400'}">${t.nama.charAt(0).toUpperCase()}</div>
                        <div>
                            <h3 class="font-bold text-white text-sm md:text-base">${escapeHtml(t.nama)}</h3>
                            <p class="text-slate-400 text-xs">${escapeHtml(t.platform)} • ${t.tanggal}</p>
                        </div>
                    </div>
                    <span class="px-2.5 py-1 rounded-full text-[9px] md:text-[10px] font-bold uppercase self-end sm:self-auto ${t.status ? 'bg-emerald-900/30 text-emerald-400' : 'bg-amber-900/30 text-amber-400'}">${t.status ? 'Selesai' : 'Pending'}</span>
                </div>`).join('')}
            </div>`;
        }

        // ──────────────────────────────────────
        // HELPERS
        // ──────────────────────────────────────
        function escapeHtml(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function getFilteredTransfers() {
            let result = [...transfers];
            if (searchQuery.trim()) {
                const q = searchQuery.toLowerCase();
                result = result.filter(t => t.nama.toLowerCase().includes(q));
            }
            result.sort((a, b) => a.id - b.id);
            return result;
        }

        function getStats() {
            return {
                total: transfers.length,
                selesai: transfers.filter(t => t.status).length,
                pending: transfers.filter(t => !t.status).length,
            };
        }

        // ──────────────────────────────────────
        // DEBOUNCE SEARCH (tanpa gangguan fokus)
        // ──────────────────────────────────────
        function debounceWithFocus(func, delay) {
            let timer;
            return function(inputElement) {
                clearTimeout(timer);
                const id = inputElement.id;
                pendingFocus = id;
                timer = setTimeout(() => {
                    func(inputElement.value);
                }, delay);
            };
        }

        window.handleSearchDebounced = debounceWithFocus((value) => {
            searchQuery = value;
            render();
        }, 300);

        // ──────────────────────────────────────
        // INISIALISASI
        // ──────────────────────────────────────
        render();
    </script>
</body>
</html>
